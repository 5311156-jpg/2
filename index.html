<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקהילה - דשבורד מערכת</title>

<style>
  :root {
    --bg-color: #111;
    --header-bg: #000;
    --accent-color: #ffcc00;
    --ticker-speed: 30s; /* מהירות הגלילה - ככל שהמספר קטן יותר זה מהיר יותר */
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-color);
    color: white;
    overflow: hidden;
  }

  /* כותרת עליונה */
  .header {
    height: 90px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    border-bottom: 2px solid #333;
    box-sizing: border-box;
    gap: 20px;
  }

  .logo img {
    height: 50px;
    object-fit: contain;
  }

  .title {
    font-size: 26px;
    font-weight: bold;
    flex: 1;
    text-align: center;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .countdown-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 270px;
    padding: 8px 16px;
    border: 1px solid #333;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
  }

  .countdown-label {
    font-size: 15px;
    color: #ddd;
    margin-bottom: 4px;
  }

  .countdown {
    font-size: 24px;
    font-family: monospace;
    font-weight: bold;
    color: var(--accent-color);
    direction: ltr;
  }

  .clock {
    font-size: 32px;
    font-family: monospace;
    font-weight: bold;
    color: var(--accent-color);
    min-width: 130px;
    text-align: center;
    direction: ltr;
  }

  /* אזור הגיליון */
  .sheet-container {
    height: calc(100vh - 160px);
    background: #fff;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* טיקר חדשות מודרני */
  .ticker-wrap {
    height: 70px;
    background: var(--header-bg);
    border-top: 2px solid #333;
    position: fixed;
    bottom: 0;
    width: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .ticker-label {
    background: #ce0000;
    color: white;
    padding: 0 25px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 22px;
    z-index: 100;
    box-shadow: 10px 0 20px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  .ticker-nav {
    display: flex;
    white-space: nowrap;
    padding-right: 100%;
    animation: scroll-it var(--ticker-speed) linear infinite;
  }

  @keyframes scroll-it {
    0% { transform: translateX(0); }
    100% { transform: translateX(100%); }
  }

  .news-item {
    display: flex;
    align-items: center;
    font-size: 26px;
    font-weight: 500;
    padding: 0 40px;
  }

  .news-time {
    color: var(--accent-color);
    font-weight: bold;
    margin-left: 12px;
    font-family: monospace;
  }

  .ticker-wrap:hover .ticker-nav {
    animation-play-state: paused;
  }
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png" alt="בקהילה">
  </div>

  <div class="title">סטטוס מערכת העיתון</div>

  <div class="header-right">
    <div class="countdown-box">
      <div class="countdown-label">ספירה לאחור ל-20/04/26 15:00</div>
      <div id="countdown" class="countdown">00:00:00:00</div>
    </div>
    <div id="clock" class="clock">00:00:00</div>
  </div>
</div>

<div class="sheet-container">
  <iframe src="https://docs.google.com/spreadsheets/d/1SKuHKR1LuL25cB596d4IL7HODO7TMZ5j0lWApPzjlnI/edit?usp=sharing"></iframe>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">מבזקי רוטר</div>
  <div id="ticker" class="ticker-nav">
    <span class="news-item">טוען מבזקים אחרונים...</span>
  </div>
</div>

<script>
// עדכון שעון
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString('he-IL', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });
}

// שעון עצר לאחור עד 20/04/2026 15:00 (שעון ישראל קיץ +03:00)
function updateCountdown() {
  const targetDate = new Date('2026-04-20T15:00:00+03:00');
  const now = new Date();
  const diff = targetDate - now;

  const countdownElem = document.getElementById("countdown");

  if (diff <= 0) {
    countdownElem.innerText = "00:00:00:00";
    return;
  }

  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  const pad = (num) => String(num).padStart(2, '0');
  countdownElem.innerText = `${pad(days)}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
}

setInterval(updateClock, 1000);
setInterval(updateCountdown, 1000);
updateClock();
updateCountdown();

// משיכת חדשות מרוטר עם טיפול בקידוד
async function loadNews() {
  const RSS_URL = "https://rotter.net/rss/rotternews.xml";
  const PROXY_URL = "https://corsproxy.io/?" + encodeURIComponent(RSS_URL + "?t=" + Date.now());

  try {
    const response = await fetch(PROXY_URL);
    if (!response.ok) throw new Error('Network error');

    const buffer = await response.arrayBuffer();
    const decoder = new TextDecoder('windows-1255');
    const text = decoder.decode(buffer);

    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(text, "text/xml");
    const items = xmlDoc.querySelectorAll("item");

    let newsHtml = "";
    items.forEach((item, index) => {
      if (index < 15) {
        const title = item.querySelector("title")?.textContent || "";
        const pubDate = item.querySelector("pubDate")?.textContent || "";

        const dateObj = new Date(pubDate);
        const timeStr = isNaN(dateObj) ? "" : dateObj.toLocaleTimeString('he-IL', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        });

        newsHtml += `
          <div class="news-item">
            <span class="news-time">${timeStr}</span>
            <span class="news-text">${title}</span>
          </div>
          <span style="color:#444; font-size:20px;">●</span>
        `;
      }
    });

    if (newsHtml) {
      const tickerElem = document.getElementById("ticker");
      tickerElem.innerHTML = newsHtml;

      const textLength = tickerElem.innerText.length;
      const newSpeed = Math.max(20, textLength / 15);
      tickerElem.style.setProperty('--ticker-speed', newSpeed + 's');
    }
  } catch (error) {
    console.error("News error:", error);
  }
}

loadNews();
setInterval(loadNews, 120000);
</script>

</body>
</html>
