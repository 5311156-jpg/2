<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקהילה - דשבורד מערכת</title>

<style>
  :root {
    --bg-color: #0a0a0a;
    --header-bg: #030303;
    --accent-color: #ffcc00;
    --danger-color: #ff2f2f;
    --ticker-speed: 30s;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at center, rgba(120,0,0,0.10) 0%, rgba(0,0,0,0) 38%),
      linear-gradient(180deg, #111 0%, #080808 100%);
    color: white;
    overflow: hidden;
  }

  .header {
    height: 122px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
      var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid #222;
    gap: 20px;
    position: relative;
    z-index: 2;
  }

  .header::after {
    content: "";
    position: absolute;
    right: 0;
    left: 0;
    bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,47,47,0.7), transparent);
    box-shadow: 0 0 18px rgba(255,47,47,0.4);
  }

  .brand {
    min-width: 230px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .brand-logo {
    height: 72px;
    width: auto;
    display: block;
    object-fit: contain;
    filter:
      drop-shadow(0 0 8px rgba(255,255,255,0.12))
      drop-shadow(0 0 20px rgba(255,255,255,0.06));
  }

  .center-zone {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .deadline-shell {
    min-width: 640px;
    max-width: 900px;
    width: 100%;
    padding: 12px 20px 16px;
    border-radius: 22px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
      linear-gradient(135deg, rgba(70,0,0,0.42), rgba(0,0,0,0.82));
    border: 1px solid rgba(255, 70, 70, 0.35);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 0 25px rgba(255, 0, 0, 0.14),
      0 18px 42px rgba(0,0,0,0.45);
    position: relative;
    overflow: hidden;
    animation: shellPulse 1.8s ease-in-out infinite alternate;
  }

  .deadline-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 48%, transparent 100%);
    transform: translateX(-100%);
    animation: sweep 3.4s linear infinite;
    pointer-events: none;
  }

  .deadline-shell::after {
    content: "";
    position: absolute;
    right: -20%;
    bottom: 0;
    width: 40%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--danger-color), transparent);
    box-shadow: 0 0 14px rgba(255,47,47,0.6);
    animation: bottomSweep 1.7s linear infinite;
  }

  .countdown {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 76px;
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1;
    direction: ltr;
    text-align: center;
    white-space: nowrap;
    color: #fff;
    text-shadow:
      0 0 10px rgba(255,255,255,0.18),
      0 0 24px rgba(255,70,70,0.24),
      0 0 48px rgba(255,0,0,0.14);
    position: relative;
    z-index: 1;
  }

  .countdown .sep {
    display: inline-block;
    width: 0.8ch;
    text-align: center;
    color: #ff8080;
    animation: blink 1s steps(1) infinite;
  }

  .micro-bar {
    margin-top: 12px;
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    position: relative;
  }

  .micro-bar-fill {
    height: 100%;
    width: 22%;
    border-radius: 999px;
    background: linear-gradient(90deg, #6b0000, #ff2f2f, #ff8b8b);
    box-shadow: 0 0 16px rgba(255,47,47,0.45);
    animation: barMove 1.6s linear infinite;
  }

  .deadline-shell.urgent {
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 0 34px rgba(255, 0, 0, 0.22),
      0 18px 46px rgba(0,0,0,0.52);
  }

  .deadline-shell.urgent .countdown {
    text-shadow:
      0 0 12px rgba(255,255,255,0.20),
      0 0 28px rgba(255,70,70,0.30),
      0 0 60px rgba(255,0,0,0.20);
  }

  .deadline-shell.danger {
    border-color: rgba(255, 70, 70, 0.7);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.03),
      0 0 44px rgba(255, 0, 0, 0.30),
      0 0 90px rgba(255, 0, 0, 0.12),
      0 18px 52px rgba(0,0,0,0.58);
    animation: dangerPulse 0.75s ease-in-out infinite alternate;
  }

  .deadline-shell.danger .countdown {
    color: #fff3f3;
    text-shadow:
      0 0 12px rgba(255,255,255,0.24),
      0 0 34px rgba(255,80,80,0.35),
      0 0 74px rgba(255,0,0,0.28);
  }

  .deadline-shell.expired {
    border-color: rgba(255, 90, 90, 0.85);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.03),
      0 0 36px rgba(255, 0, 0, 0.34),
      0 0 90px rgba(255, 0, 0, 0.16);
  }

  .deadline-shell.expired .countdown {
    color: #ff9d9d;
  }

  .header-right {
    min-width: 140px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  .clock {
    font-size: 34px;
    font-family: Consolas, 'Courier New', monospace;
    font-weight: 700;
    color: var(--accent-color);
    direction: ltr;
    text-align: center;
    min-width: 120px;
    text-shadow: 0 0 10px rgba(255, 204, 0, 0.18);
  }

  .sheet-container {
    height: calc(100vh - 192px);
    background: #fff;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .ticker-wrap {
    height: 70px;
    background: var(--header-bg);
    border-top: 1px solid #222;
    position: fixed;
    bottom: 0;
    width: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    z-index: 5;
  }

  .ticker-label {
    background: #c40000;
    color: white;
    padding: 0 25px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: 800;
    font-size: 22px;
    z-index: 100;
    box-shadow: 10px 0 20px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  .ticker-nav {
    display: flex;
    white-space: nowrap;
    padding-right: 100%;
    animation: scroll-it var(--ticker-speed) linear infinite;
  }

  .news-item {
    display: flex;
    align-items: center;
    font-size: 26px;
    font-weight: 500;
    padding: 0 40px;
  }

  .news-time {
    color: var(--accent-color);
    font-weight: 700;
    margin-left: 12px;
    font-family: Consolas, 'Courier New', monospace;
    direction: ltr;
  }

  .ticker-wrap:hover .ticker-nav {
    animation-play-state: paused;
  }

  @keyframes scroll-it {
    0% { transform: translateX(0); }
    100% { transform: translateX(100%); }
  }

  @keyframes shellPulse {
    from {
      transform: scale(1);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 20px rgba(255, 0, 0, 0.12),
        0 18px 38px rgba(0,0,0,0.42);
    }
    to {
      transform: scale(1.008);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 30px rgba(255, 0, 0, 0.18),
        0 18px 46px rgba(0,0,0,0.5);
    }
  }

  @keyframes dangerPulse {
    from { transform: scale(1); }
    to { transform: scale(1.014); }
  }

  @keyframes sweep {
    0% { transform: translateX(-115%); }
    100% { transform: translateX(115%); }
  }

  @keyframes bottomSweep {
    0% { right: -35%; }
    100% { right: 115%; }
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.35; }
  }

  @keyframes barMove {
    0% { transform: translateX(-130%); }
    100% { transform: translateX(520%); }
  }

  @media (max-width: 1200px) {
    .countdown {
      font-size: 58px;
      letter-spacing: 4px;
    }

    .deadline-shell {
      min-width: 480px;
    }

    .brand-logo {
      height: 58px;
    }
  }
</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <img class="brand-logo" src="לוגו בקהילה וקטורי.jpg" alt="בקהילה">
  </div>

  <div class="center-zone">
    <div id="deadlineShell" class="deadline-shell">
      <div id="countdown" class="countdown">00<span class="sep">:</span>00<span class="sep">:</span>00<span class="sep">:</span>00</div>
      <div class="micro-bar">
        <div class="micro-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="header-right">
    <div id="clock" class="clock">00:00:00</div>
  </div>
</div>

<div class="sheet-container">
  <iframe src="https://docs.google.com/spreadsheets/d/1SKuHKR1LuL25cB596d4IL7HODO7TMZ5j0lWApPzjlnI/preview"></iframe>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">מבזקי רוטר</div>
  <div id="ticker" class="ticker-nav">
    <span class="news-item">טוען מבזקים אחרונים...</span>
  </div>
</div>

<script>
function pad(num) {
  return String(num).padStart(2, '0');
}

function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString('he-IL', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });
}

function updateCountdown() {
  const targetDate = new Date('2026-04-29T15:00:00+03:00');
  const now = new Date();
  const diff = targetDate - now;

  const countdownElem = document.getElementById("countdown");
  const shellElem = document.getElementById("deadlineShell");

  shellElem.classList.remove("urgent", "danger", "expired");

  if (diff <= 0) {
    countdownElem.innerHTML = `00<span class="sep">:</span>00<span class="sep">:</span>00<span class="sep">:</span>00`;
    shellElem.classList.add("expired");
    return;
  }

  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  countdownElem.innerHTML =
    `${pad(days)}<span class="sep">:</span>${pad(hours)}<span class="sep">:</span>${pad(minutes)}<span class="sep">:</span>${pad(seconds)}`;

  if (diff <= 24 * 60 * 60 * 1000) {
    shellElem.classList.add("urgent");
  }

  if (diff <= 6 * 60 * 60 * 1000) {
    shellElem.classList.add("danger");
  }
}

async function loadNews() {
  const RSS_URL = "https://rotter.net/rss/rotternews.xml";
  const PROXY_URL = "https://corsproxy.io/?" + encodeURIComponent(RSS_URL + "?t=" + Date.now());

  try {
    const response = await fetch(PROXY_URL);
    if (!response.ok) throw new Error('Network error');

    const buffer = await response.arrayBuffer();
    const decoder = new TextDecoder('windows-1255');
    const text = decoder.decode(buffer);

    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(text, "text/xml");
    const items = xmlDoc.querySelectorAll("item");

    let newsHtml = "";

    items.forEach((item, index) => {
      if (index < 15) {
        const title = item.querySelector("title")?.textContent || "";
        const pubDate = item.querySelector("pubDate")?.textContent || "";

        const dateObj = new Date(pubDate);
        const timeStr = isNaN(dateObj)
          ? ""
          : dateObj.toLocaleTimeString('he-IL', {
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            });

        newsHtml += `
          <div class="news-item">
            <span class="news-time">${timeStr}</span>
            <span class="news-text">${title}</span>
          </div>
          <span style="color:#444; font-size:20px;">●</span>
        `;
      }
    });

    if (newsHtml) {
      const tickerElem = document.getElementById("ticker");
      tickerElem.innerHTML = newsHtml;

      const textLength = tickerElem.innerText.length;
      const newSpeed = Math.max(20, textLength / 15);
      document.documentElement.style.setProperty('--ticker-speed', newSpeed + 's');
    }
  } catch (error) {
    console.error("News error:", error);
  }
}

updateClock();
updateCountdown();
loadNews();

setInterval(updateClock, 1000);
setInterval(updateCountdown, 1000);
setInterval(loadNews, 120000);
</script>

</body>
</html>
