<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקהילה - דשבורד מערכת</title>

<style>
  :root {
    --bg-color: #070707;
    --header-bg: rgba(10, 10, 10, 0.92);
    --panel-bg: rgba(255,255,255,0.04);
    --panel-border: rgba(255,255,255,0.08);
    --accent-color: #ffcc00;
    --danger-color: #ff2a2a;
    --danger-soft: rgba(255,42,42,0.20);
    --text-soft: #cfcfcf;
    --ticker-speed: 30s;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: white;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,0,0,0.10) 0%, rgba(255,0,0,0.02) 18%, rgba(0,0,0,0) 42%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 35%),
      linear-gradient(180deg, #121212 0%, #080808 100%);
  }

  .header {
    height: 140px;
    background: var(--header-bg);
    backdrop-filter: blur(10px);
    display: grid;
    grid-template-columns: 280px 1fr 170px;
    align-items: center;
    gap: 24px;
    padding: 14px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    z-index: 10;
  }

  .header::after {
    content: "";
    position: absolute;
    right: 0;
    left: 0;
    bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,42,42,0.85), transparent);
    box-shadow: 0 0 18px rgba(255,42,42,0.35);
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    min-width: 0;
  }

  .brand-logo {
    max-width: 230px;
    max-height: 82px;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    filter:
      drop-shadow(0 0 10px rgba(255,255,255,0.05))
      drop-shadow(0 0 20px rgba(255,0,0,0.10));
  }

  .center-zone {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .deadline-panel {
    width: min(980px, 100%);
    padding: 14px 18px 12px;
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,0.08);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
      linear-gradient(135deg, rgba(70,0,0,0.42), rgba(0,0,0,0.78));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 0 0 1px rgba(255,255,255,0.02),
      0 12px 34px rgba(0,0,0,0.35),
      0 0 30px rgba(255,0,0,0.14);
    position: relative;
    overflow: hidden;
    animation: shellPulse 1.8s ease-in-out infinite alternate;
  }

  .deadline-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 48%, transparent 100%);
    transform: translateX(-100%);
    animation: sweep 3.6s linear infinite;
    pointer-events: none;
  }

  .deadline-panel::after {
    content: "";
    position: absolute;
    right: -25%;
    bottom: 0;
    width: 40%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--danger-color), transparent);
    box-shadow: 0 0 14px rgba(255,42,42,0.55);
    animation: bottomSweep 1.6s linear infinite;
  }

  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(110px, 1fr));
    gap: 12px;
    position: relative;
    z-index: 2;
  }

  .time-box {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 10px 8px 8px;
    text-align: center;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 6px 14px rgba(0,0,0,0.22);
  }

  .time-value {
    font-family: Consolas, 'Courier New', monospace;
    font-weight: 900;
    font-size: 52px;
    line-height: 1;
    letter-spacing: 2px;
    color: #fff;
    direction: ltr;
    text-shadow:
      0 0 8px rgba(255,255,255,0.18),
      0 0 18px rgba(255,50,50,0.24),
      0 0 34px rgba(255,0,0,0.14);
  }

  .time-label {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-soft);
    letter-spacing: 0.5px;
  }

  .progress-wrap {
    position: relative;
    z-index: 2;
    margin-top: 12px;
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 24%;
    border-radius: 999px;
    background: linear-gradient(90deg, #5b0000, #ff2a2a, #ff8f8f);
    box-shadow: 0 0 14px rgba(255,42,42,0.45);
    animation: barMove 1.6s linear infinite;
  }

  .deadline-panel.urgent {
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 0 0 1px rgba(255,255,255,0.03),
      0 12px 34px rgba(0,0,0,0.35),
      0 0 44px rgba(255,0,0,0.22);
  }

  .deadline-panel.urgent .time-value {
    text-shadow:
      0 0 10px rgba(255,255,255,0.22),
      0 0 24px rgba(255,50,50,0.30),
      0 0 46px rgba(255,0,0,0.18);
  }

  .deadline-panel.danger {
    border-color: rgba(255,42,42,0.55);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.03),
      0 0 0 1px rgba(255,42,42,0.14),
      0 14px 36px rgba(0,0,0,0.40),
      0 0 58px rgba(255,0,0,0.26);
    animation: dangerPulse 0.8s ease-in-out infinite alternate;
  }

  .deadline-panel.danger .time-box {
    border-color: rgba(255,42,42,0.28);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 0 18px rgba(255,42,42,0.10);
  }

  .deadline-panel.expired {
    border-color: rgba(255,70,70,0.65);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.03),
      0 0 0 1px rgba(255,42,42,0.14),
      0 0 48px rgba(255,0,0,0.24);
  }

  .deadline-panel.expired .time-value {
    color: #ff9d9d;
  }

  .header-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .clock-box {
    min-width: 132px;
    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
  }

  .clock {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 34px;
    font-weight: 800;
    color: var(--accent-color);
    direction: ltr;
    text-shadow: 0 0 10px rgba(255,204,0,0.18);
  }

  .sheet-container {
    height: calc(100vh - 210px);
    background: #ffffff;
    position: relative;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: white;
  }

  .ticker-wrap {
    height: 70px;
    background: rgba(8,8,8,0.96);
    border-top: 1px solid rgba(255,255,255,0.06);
    position: fixed;
    bottom: 0;
    width: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    z-index: 20;
  }

  .ticker-label {
    background: #c40000;
    color: white;
    padding: 0 24px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: 800;
    font-size: 22px;
    white-space: nowrap;
    z-index: 5;
    box-shadow: 10px 0 22px rgba(0,0,0,0.75);
  }

  .ticker-nav {
    display: flex;
    white-space: nowrap;
    padding-right: 100%;
    animation: scroll-it var(--ticker-speed) linear infinite;
  }

  .news-item {
    display: flex;
    align-items: center;
    font-size: 26px;
    font-weight: 500;
    padding: 0 36px;
  }

  .news-time {
    color: var(--accent-color);
    font-weight: 800;
    margin-left: 12px;
    font-family: Consolas, 'Courier New', monospace;
    direction: ltr;
  }

  .ticker-wrap:hover .ticker-nav {
    animation-play-state: paused;
  }

  @keyframes scroll-it {
    0% { transform: translateX(0); }
    100% { transform: translateX(100%); }
  }

  @keyframes shellPulse {
    from {
      transform: scale(1);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 12px 34px rgba(0,0,0,0.35),
        0 0 30px rgba(255,0,0,0.14);
    }
    to {
      transform: scale(1.006);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 14px 40px rgba(0,0,0,0.40),
        0 0 38px rgba(255,0,0,0.18);
    }
  }

  @keyframes dangerPulse {
    from { transform: scale(1); }
    to { transform: scale(1.01); }
  }

  @keyframes sweep {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  @keyframes bottomSweep {
    0% { right: -35%; }
    100% { right: 115%; }
  }

  @keyframes barMove {
    0% { transform: translateX(-130%); }
    100% { transform: translateX(520%); }
  }

  @media (max-width: 1350px) {
    .header {
      grid-template-columns: 220px 1fr 150px;
    }

    .time-value {
      font-size: 42px;
    }

    .brand-logo {
      max-width: 190px;
      max-height: 68px;
    }
  }

  @media (max-width: 1100px) {
    .header {
      height: 160px;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      padding: 12px 16px;
    }

    .brand,
    .center-zone,
    .header-right {
      justify-content: center;
    }

    .sheet-container {
      height: calc(100vh - 230px);
    }

    .countdown-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .time-value {
      font-size: 34px;
    }
  }
</style>
</head>

<body>

<img id="sourceLogo" src="לוגו בקהילה וקטורי.jpg" alt="" style="display:none;">

<div class="header">
  <div class="brand">
    <img id="logoDisplay" class="brand-logo" alt="בקהילה">
  </div>

  <div class="center-zone">
    <div id="deadlinePanel" class="deadline-panel">
      <div class="countdown-grid">
        <div class="time-box">
          <div id="days" class="time-value">00</div>
          <div class="time-label">ימים</div>
        </div>
        <div class="time-box">
          <div id="hours" class="time-value">00</div>
          <div class="time-label">שעות</div>
        </div>
        <div class="time-box">
          <div id="minutes" class="time-value">00</div>
          <div class="time-label">דקות</div>
        </div>
        <div class="time-box">
          <div id="seconds" class="time-value">00</div>
          <div class="time-label">שניות</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>

  <div class="header-right">
    <div class="clock-box">
      <div id="clock" class="clock">00:00:00</div>
    </div>
  </div>
</div>

<div class="sheet-container">
  <iframe src="https://docs.google.com/spreadsheets/d/1SKuHKR1LuL25cB596d4IL7HODO7TMZ5j0lWApPzjlnI/preview"></iframe>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">מבזקי רוטר</div>
  <div id="ticker" class="ticker-nav">
    <span class="news-item">טוען מבזקים אחרונים...</span>
  </div>
</div>

<script>
function pad(num) {
  return String(num).padStart(2, '0');
}

function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString('he-IL', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });
}

function updateCountdown() {
  const targetDate = new Date('2026-04-29T15:00:00+03:00');
  const now = new Date();
  const diff = targetDate - now;

  const panel = document.getElementById("deadlinePanel");

  panel.classList.remove("urgent", "danger", "expired");

  if (diff <= 0) {
    document.getElementById("days").innerText = "00";
    document.getElementById("hours").innerText = "00";
    document.getElementById("minutes").innerText = "00";
    document.getElementById("seconds").innerText = "00";
    panel.classList.add("expired");
    return;
  }

  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  document.getElementById("days").innerText = pad(days);
  document.getElementById("hours").innerText = pad(hours);
  document.getElementById("minutes").innerText = pad(minutes);
  document.getElementById("seconds").innerText = pad(seconds);

  if (diff <= 24 * 60 * 60 * 1000) {
    panel.classList.add("urgent");
  }

  if (diff <= 6 * 60 * 60 * 1000) {
    panel.classList.add("danger");
  }
}

function processLogoToTransparent() {
  const sourceImg = document.getElementById("sourceLogo");
  const outputImg = document.getElementById("logoDisplay");

  function run() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    canvas.width = sourceImg.naturalWidth;
    canvas.height = sourceImg.naturalHeight;

    ctx.drawImage(sourceImg, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const avg = (r + g + b) / 3;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const diff = max - min;

      if (avg > 210 && diff < 35) {
        const fade = Math.min(255, (avg - 210) * 6);
        data[i + 3] = Math.max(0, 255 - fade);
      }

      if (r > 140 && g < 150 && b < 150) {
        data[i] = Math.min(255, r + 18);
        data[i + 1] = Math.max(0, g - 10);
        data[i + 2] = Math.max(0, b - 10);
        data[i + 3] = 255;
      }
    }

    ctx.putImageData(imageData, 0, 0);

    const trimmed = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let minX = canvas.width;
    let minY = canvas.height;
    let maxX = 0;
    let maxY = 0;
    let found = false;

    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        const idx = (y * canvas.width + x) * 4;
        const alpha = trimmed[idx + 3];

        if (alpha > 15) {
          found = true;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    if (!found) {
      outputImg.src = sourceImg.src;
      return;
    }

    const paddingX = 14;
    const paddingY = 12;

    minX = Math.max(0, minX - paddingX);
    minY = Math.max(0, minY - paddingY);
    maxX = Math.min(canvas.width - 1, maxX + paddingX);
    maxY = Math.min(canvas.height - 1, maxY + paddingY);

    const cropWidth = maxX - minX + 1;
    const cropHeight = maxY - minY + 1;

    const cropCanvas = document.createElement("canvas");
    const cropCtx = cropCanvas.getContext("2d");

    cropCanvas.width = cropWidth;
    cropCanvas.height = cropHeight;

    cropCtx.drawImage(
      canvas,
      minX, minY, cropWidth, cropHeight,
      0, 0, cropWidth, cropHeight
    );

    outputImg.src = cropCanvas.toDataURL("image/png");
  }

  if (sourceImg.complete) {
    run();
  } else {
    sourceImg.onload = run;
  }
}

async function loadNews() {
  const RSS_URL = "https://rotter.net/rss/rotternews.xml";
  const PROXY_URL = "https://corsproxy.io/?" + encodeURIComponent(RSS_URL + "?t=" + Date.now());

  try {
    const response = await fetch(PROXY_URL);
    if (!response.ok) throw new Error("Network error");

    const buffer = await response.arrayBuffer();
    const decoder = new TextDecoder("windows-1255");
    const text = decoder.decode(buffer);

    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(text, "text/xml");
    const items = xmlDoc.querySelectorAll("item");

    let newsHtml = "";

    items.forEach((item, index) => {
      if (index < 15) {
        const title = item.querySelector("title")?.textContent || "";
        const pubDate = item.querySelector("pubDate")?.textContent || "";

        const dateObj = new Date(pubDate);
        const timeStr = isNaN(dateObj)
          ? ""
          : dateObj.toLocaleTimeString("he-IL", {
              hour: "2-digit",
              minute: "2-digit",
              hour12: false
            });

        newsHtml += `
          <div class="news-item">
            <span class="news-time">${timeStr}</span>
            <span class="news-text">${title}</span>
          </div>
          <span style="color:#444; font-size:20px;">●</span>
        `;
      }
    });

    if (newsHtml) {
      const tickerElem = document.getElementById("ticker");
      tickerElem.innerHTML = newsHtml;

      const textLength = tickerElem.innerText.length;
      const newSpeed = Math.max(20, textLength / 15);
      document.documentElement.style.setProperty("--ticker-speed", newSpeed + "s");
    }
  } catch (error) {
    console.error("News error:", error);
  }
}

updateClock();
updateCountdown();
processLogoToTransparent();
loadNews();

setInterval(updateClock, 1000);
setInterval(updateCountdown, 1000);
setInterval(loadNews, 120000);
</script>

</body>
</html>
